name: BTGS metadata check

on:
  push:
    branches:
      - main
    paths:
      - '.github/**'
      - 'CMakeLists.txt'
      - 'cmake/module/GenerateSetupNsi.cmake'
      - 'cmake/module/Maintenance.cmake'
      - 'share/examples/btgs.conf'
      - 'share/setup.nsi.in'
      - 'src/common/args.cpp'
      - 'src/kernel/chainparams.cpp'
      - 'src/qt/guiconstants.h'
  pull_request:
    paths:
      - '.github/**'
      - 'CMakeLists.txt'
      - 'cmake/module/GenerateSetupNsi.cmake'
      - 'cmake/module/Maintenance.cmake'
      - 'share/examples/btgs.conf'
      - 'share/setup.nsi.in'
      - 'src/common/args.cpp'
      - 'src/kernel/chainparams.cpp'
      - 'src/qt/guiconstants.h'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: btgs-metadata-${{ github.ref }}
  cancel-in-progress: true

jobs:
  metadata:
    name: BTGS identity and release file check
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify BTGS metadata
        shell: bash
        run: |
          set -euo pipefail

          test ! -e "BTGS Guide compilation precompile.txt"
          test -f share/examples/btgs.conf
          test -f .github/workflows/build-release.yml

          grep -Fq 'set(CLIENT_NAME "Bitcoin Gold BTGS Core")' CMakeLists.txt
          grep -Fq 'set(CLIENT_VERSION_MAJOR 30)' CMakeLists.txt
          grep -Fq 'set(CLIENT_VERSION_MINOR 2)' CMakeLists.txt
          grep -Fq 'set(CLIENT_VERSION_BUILD 1)' CMakeLists.txt

          grep -Fq '#define QAPP_ORG_NAME "BTGS"' src/qt/guiconstants.h
          grep -Fq '#define QAPP_APP_NAME_DEFAULT "BTGS-Qt"' src/qt/guiconstants.h

          grep -Fq 'btgs.conf' src/common/args.cpp
          grep -Fq 'BTGS' src/common/args.cpp

          grep -Fq '00000000000000138aa6a00283533f9c13ba50f210479bd6abee12f2a52d2dab' src/kernel/chainparams.cpp
          grep -Fq '0000000000000000000000000000000000000000000000c881c9a24f9120650a' src/kernel/chainparams.cpp

          grep -Fq 'aarch64-apple-darwin' .github/workflows/build-release.yml
          grep -Fq 'x86_64-linux-gnu' .github/workflows/build-release.yml
          grep -Fq 'aarch64-linux-gnu' .github/workflows/build-release.yml
          grep -Fq 'win64.zip' .github/workflows/build-release.yml
          grep -Fq 'win64-setup.exe' .github/workflows/build-release.yml

          grep -Fq 'btgs.conf' share/setup.nsi.in
          grep -Fq 'InstallDir $PROGRAMFILES64\BTGS' share/setup.nsi.in
          grep -Fq 'set(CLIENT_TARNAME "btgs")' cmake/module/GenerateSetupNsi.cmake

          if grep -R -nE 'Bitcoin Core Security Policy|bitcoincore\.org|bitcoin\.stackexchange\.com|GUI-related pull requests should be opened against' .github/ISSUE_TEMPLATE .github/PULL_REQUEST_TEMPLATE.md; then
            echo "Bitcoin Core GitHub metadata remains in .github" >&2
            exit 1
          fi

          if find . -name '*:Zone.Identifier' -print -quit | grep -q .; then
            echo "Windows Zone.Identifier metadata files are present" >&2
            exit 1
          fi
