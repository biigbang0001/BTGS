name: Build BTGS release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
      - 'V*'

permissions:
  contents: read

env:
  VERSION: "30.2.1"
  MAKEJOBS: "3"

jobs:
  linux:
    name: Linux ${{ matrix.artifact }}
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    strategy:
      fail-fast: false
      matrix:
        include:
          - host: x86_64-linux-gnu
            artifact: x86_64-linux-gnu
            packages: g++
            strip: strip
          - host: aarch64-linux-gnu
            artifact: aarch64-linux-gnu
            packages: g++-aarch64-linux-gnu
            strip: aarch64-linux-gnu-strip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y             build-essential automake bison bsdmainutils cmake curl git libtool             pkgconf python3 tar unzip zip ${{ matrix.packages }}

      - name: Cache depends
        uses: actions/cache@v4
        with:
          path: |
            depends/built
            depends/sources
            depends/${{ matrix.host }}
          key: btgs-depends-linux-${{ matrix.host }}-${{ hashFiles('depends/packages/*', 'depends/patches/**') }}
          restore-keys: |
            btgs-depends-linux-${{ matrix.host }}-

      - name: Build depends
        run: make -C depends HOST=${{ matrix.host }} -j${MAKEJOBS}

      - name: Configure BTGS
        run: |
          cmake -B build-${{ matrix.artifact }} --toolchain depends/${{ matrix.host }}/toolchain.cmake             -DCMAKE_BUILD_TYPE=Release             -DBUILD_GUI=ON             -DBUILD_GUI_TESTS=OFF             -DBUILD_TESTS=OFF             -DBUILD_BENCH=OFF             -DBUILD_TX=ON             -DBUILD_UTIL=ON             -DBUILD_WALLET_TOOL=ON             -DENABLE_IPC=OFF             -DREDUCE_EXPORTS=ON

      - name: Build BTGS
        run: cmake --build build-${{ matrix.artifact }} -j${MAKEJOBS}

      - name: Package tar.gz
        shell: bash
        run: |
          set -euo pipefail
          build_dir="build-${{ matrix.artifact }}"
          pkg="btgs-${VERSION}-${{ matrix.artifact }}"
          mkdir -p "release/${pkg}/bin" "release/${pkg}/share/rpcauth"

          copy_required() {
            src="$(find "${build_dir}" -type f -path "*/bin/$1" -print -quit)"
            test -n "${src}"
            cp "${src}" "release/${pkg}/bin/$2"
          }

          copy_optional() {
            src="$(find "${build_dir}" -type f -path "*/bin/$1" -print -quit)"
            if [ -n "${src}" ]; then
              cp "${src}" "release/${pkg}/bin/$2"
            fi
          }

          copy_optional bitcoin btgs
          copy_optional bitcoin-qt btgs-qt
          copy_required bitcoind btgsd
          copy_required bitcoin-cli btgs-cli
          copy_required bitcoin-tx btgs-tx
          copy_required bitcoin-wallet btgs-wallet
          copy_required bitcoin-util btgs-util

          ${{ matrix.strip }} "release/${pkg}/bin/"* || true
          cp COPYING "release/${pkg}/COPYING.txt"
          cp README.md "release/${pkg}/README.md"
          cp share/examples/btgs.conf "release/${pkg}/btgs.conf"
          cp -R share/rpcauth/. "release/${pkg}/share/rpcauth/"

          tar -C release -czf "release/${pkg}.tar.gz" "${pkg}"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: btgs-${{ env.VERSION }}-${{ matrix.artifact }}-tar
          path: release/btgs-${{ env.VERSION }}-${{ matrix.artifact }}.tar.gz
          retention-days: 14

  windows:
    name: Windows win64
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y             build-essential automake bison bsdmainutils cmake curl git libtool             g++-mingw-w64-x86-64-posix nsis pkgconf python3 tar unzip zip
          sudo update-alternatives --set x86_64-w64-mingw32-gcc /usr/bin/x86_64-w64-mingw32-gcc-posix
          sudo update-alternatives --set x86_64-w64-mingw32-g++ /usr/bin/x86_64-w64-mingw32-g++-posix

      - name: Cache depends
        uses: actions/cache@v4
        with:
          path: |
            depends/built
            depends/sources
            depends/x86_64-w64-mingw32
          key: btgs-depends-windows-x86_64-w64-mingw32-${{ hashFiles('depends/packages/*', 'depends/patches/**') }}
          restore-keys: |
            btgs-depends-windows-x86_64-w64-mingw32-

      - name: Build depends
        run: make -C depends HOST=x86_64-w64-mingw32 -j${MAKEJOBS}

      - name: Configure BTGS
        run: |
          cmake -B build-win64 --toolchain depends/x86_64-w64-mingw32/toolchain.cmake             -DCMAKE_BUILD_TYPE=Release             -DBUILD_GUI=ON             -DBUILD_GUI_TESTS=OFF             -DBUILD_TESTS=OFF             -DBUILD_BENCH=OFF             -DBUILD_TX=ON             -DBUILD_UTIL=ON             -DBUILD_WALLET_TOOL=ON             -DENABLE_IPC=OFF             -DREDUCE_EXPORTS=ON             -DCMAKE_CXX_FLAGS='-Wno-error=maybe-uninitialized'

      - name: Build BTGS
        run: cmake --build build-win64 -j${MAKEJOBS}

      - name: Build Windows installer
        run: cmake --build build-win64 --target deploy -j${MAKEJOBS}

      - name: Package Windows artifacts
        shell: bash
        run: |
          set -euo pipefail
          pkg="btgs-${VERSION}-win64"
          mkdir -p "release/${pkg}/bin" "release/${pkg}/share/rpcauth"
          cp build-win64/release/*.exe "release/${pkg}/bin/"
          cp COPYING "release/${pkg}/COPYING.txt"
          cp README.md "release/${pkg}/README.md"
          cp share/examples/btgs.conf "release/${pkg}/btgs.conf"
          cp -R share/rpcauth/. "release/${pkg}/share/rpcauth/"

          (cd release && zip -r "${pkg}.zip" "${pkg}")
          cp build-win64/btgs-win64-setup.exe "release/btgs-${VERSION}-win64-setup.exe"

      - name: Upload win64 zip
        uses: actions/upload-artifact@v4
        with:
          name: btgs-${{ env.VERSION }}-win64-zip
          path: release/btgs-${{ env.VERSION }}-win64.zip
          retention-days: 14

      - name: Upload win64 setup
        uses: actions/upload-artifact@v4
        with:
          name: btgs-${{ env.VERSION }}-win64-setup
          path: release/btgs-${{ env.VERSION }}-win64-setup.exe
          retention-days: 14

  macos-arm64:
    name: macOS arm64
    runs-on: macos-14
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install automake libtool pkg-config cmake create-dmg

      - name: Cache depends
        uses: actions/cache@v4
        with:
          path: |
            depends/built
            depends/sources
            depends/aarch64-apple-darwin
          key: btgs-depends-macos-aarch64-apple-darwin-${{ hashFiles('depends/packages/*', 'depends/patches/**') }}
          restore-keys: |
            btgs-depends-macos-aarch64-apple-darwin-

      - name: Build depends
        run: make -C depends HOST=aarch64-apple-darwin -j${MAKEJOBS}

      - name: Configure BTGS
        run: |
          cmake -B build-macos --toolchain depends/aarch64-apple-darwin/toolchain.cmake             -DCMAKE_BUILD_TYPE=Release             -DBUILD_GUI=ON             -DBUILD_GUI_TESTS=OFF             -DBUILD_TESTS=OFF             -DBUILD_BENCH=OFF             -DBUILD_TX=ON             -DBUILD_UTIL=ON             -DBUILD_WALLET_TOOL=ON             -DENABLE_IPC=OFF             -DREDUCE_EXPORTS=ON

      - name: Build BTGS
        run: cmake --build build-macos -j${MAKEJOBS}

      - name: Package macOS tar.gz
        shell: bash
        run: |
          set -euo pipefail
          pkg="btgs-${VERSION}-aarch64-apple-darwin"
          mkdir -p "release/${pkg}/bin" "release/${pkg}/share/rpcauth"

          cp build-macos/bin/bitcoin "release/${pkg}/bin/btgs" || true
          cp build-macos/bin/bitcoin-qt "release/${pkg}/bin/btgs-qt"
          cp build-macos/bin/bitcoind "release/${pkg}/bin/btgsd"
          cp build-macos/bin/bitcoin-cli "release/${pkg}/bin/btgs-cli"
          cp build-macos/bin/bitcoin-tx "release/${pkg}/bin/btgs-tx"
          cp build-macos/bin/bitcoin-wallet "release/${pkg}/bin/btgs-wallet"
          cp build-macos/bin/bitcoin-util "release/${pkg}/bin/btgs-util"

          strip "release/${pkg}/bin/"* || true
          cp COPYING "release/${pkg}/COPYING.txt"
          cp README.md "release/${pkg}/README.md"
          cp share/examples/btgs.conf "release/${pkg}/btgs.conf"
          cp -R share/rpcauth/. "release/${pkg}/share/rpcauth/"

          tar -C release -czf "release/${pkg}.tar.gz" "${pkg}"

      - name: Package macOS DMG
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dmg_contents
          mkdir -p "dmg_contents/BTGS-Qt.app/Contents/MacOS"
          mkdir -p "dmg_contents/BTGS-Qt.app/Contents/Resources"
          cp build-macos/bin/bitcoin-qt "dmg_contents/BTGS-Qt.app/Contents/MacOS/BTGS-Qt"
          cp src/qt/res/icons/bitcoin.icns "dmg_contents/BTGS-Qt.app/Contents/Resources/btgs.icns"
          cat > "dmg_contents/BTGS-Qt.app/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>BTGS-Qt</string>
              <key>CFBundleIconFile</key>
              <string>btgs.icns</string>
              <key>CFBundleIdentifier</key>
              <string>site.bitcoingold.btgs-qt</string>
              <key>CFBundleName</key>
              <string>BTGS-Qt</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>30.2.1</string>
              <key>CFBundleVersion</key>
              <string>30.2.1</string>
              <key>LSMinimumSystemVersion</key>
              <string>11.0</string>
              <key>NSHighResolutionCapable</key>
              <true/>
          </dict>
          </plist>
          PLIST

          rm -f "release/btgs-${VERSION}-aarch64-apple-darwin.dmg"
          create-dmg             --volname "BTGS Core"             --volicon "src/qt/res/icons/bitcoin.icns"             --window-pos 200 120             --window-size 600 400             --icon-size 100             --icon "BTGS-Qt.app" 150 185             --app-drop-link 450 185             "release/btgs-${VERSION}-aarch64-apple-darwin.dmg"             "dmg_contents/"

      - name: Upload macOS tar.gz
        uses: actions/upload-artifact@v4
        with:
          name: btgs-${{ env.VERSION }}-aarch64-apple-darwin-tar
          path: release/btgs-${{ env.VERSION }}-aarch64-apple-darwin.tar.gz
          retention-days: 14

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: btgs-${{ env.VERSION }}-aarch64-apple-darwin-dmg
          path: release/btgs-${{ env.VERSION }}-aarch64-apple-darwin.dmg
          retention-days: 14
