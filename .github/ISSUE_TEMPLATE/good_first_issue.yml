name: Good First Issue
description: Suggest a small, well-scoped BTGS contributor task.
labels: [good first issue]
body:
  - type: markdown
    attributes:
      value: |
        A good first issue should be low risk, clearly scoped, and useful for BTGS.
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Explain why this task is useful.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Possible solution
      description: Describe a possible solution.
    validations:
      required: false
  - type: textarea
    id: useful-skills
    attributes:
      label: Useful skills
      description: For example, "CMake packaging", "Qt6 GUI", or "BTGS RPC basics".
      value: |
        * Compiling BTGS from source
        * Running focused C++ unit tests or Python functional tests
        * Understanding BTGS/Bitcoin-style RPC interfaces
  - type: textarea
    attributes:
      label: Guidance for new contributors
      description: Optional guidance for the contributor.
      value: |
        Keep the patch small and include the commands or checks used to validate it.
