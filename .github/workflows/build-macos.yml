name: Build macOS

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
      - 'V*'

jobs:
  build-macos:
    runs-on: macos-14
    env:
      VERSION: "30.2.1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install automake libtool pkg-config cmake create-dmg

      - name: Build depends
        run: |
          cd depends
          make HOST=aarch64-apple-darwin -j3

      - name: Build BTGS
        run: |
          cmake -B build --toolchain depends/aarch64-apple-darwin/toolchain.cmake \
            -DCMAKE_BUILD_TYPE=Release -DBUILD_GUI=ON -DBUILD_TESTS=ON -DBUILD_BENCH=OFF
          cmake --build build -j3

      - name: Package tar.gz
        run: |
          mkdir -p "release/btgs-${VERSION}-aarch64-apple-darwin/bin"
          cp build/bin/bitcoind "release/btgs-${VERSION}-aarch64-apple-darwin/bin/btgsd"
          cp build/bin/bitcoin-cli "release/btgs-${VERSION}-aarch64-apple-darwin/bin/btgs-cli"
          cp build/bin/bitcoin-qt "release/btgs-${VERSION}-aarch64-apple-darwin/bin/btgs-qt"
          cp build/bin/bitcoin-tx "release/btgs-${VERSION}-aarch64-apple-darwin/bin/btgs-tx"
          cp build/bin/bitcoin-wallet "release/btgs-${VERSION}-aarch64-apple-darwin/bin/btgs-wallet"
          cp build/bin/bitcoin-util "release/btgs-${VERSION}-aarch64-apple-darwin/bin/btgs-util"
          strip "release/btgs-${VERSION}-aarch64-apple-darwin/bin/"* || true
          cd release
          tar -czvf "btgs-${VERSION}-aarch64-apple-darwin.tar.gz" "btgs-${VERSION}-aarch64-apple-darwin/"

      - name: Package DMG
        run: |
          mkdir -p "dmg_contents/BTGS-Qt.app/Contents/MacOS"
          mkdir -p "dmg_contents/BTGS-Qt.app/Contents/Resources"
          cp build/bin/bitcoin-qt "dmg_contents/BTGS-Qt.app/Contents/MacOS/BTGS-Qt"
          cp src/qt/res/icons/bitcoin.icns "dmg_contents/BTGS-Qt.app/Contents/Resources/btgs.icns"
          cat > "dmg_contents/BTGS-Qt.app/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>BTGS-Qt</string>
              <key>CFBundleIconFile</key>
              <string>btgs.icns</string>
              <key>CFBundleIdentifier</key>
              <string>site.bitcoingold.btgs-qt</string>
              <key>CFBundleName</key>
              <string>BTGS-Qt</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>30.2.1</string>
              <key>CFBundleVersion</key>
              <string>30.2.1</string>
              <key>LSMinimumSystemVersion</key>
              <string>11.0</string>
              <key>NSHighResolutionCapable</key>
              <true/>
          </dict>
          </plist>
          PLIST
          create-dmg \
            --volname "BTGS Core" \
            --volicon "src/qt/res/icons/bitcoin.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "BTGS-Qt.app" 150 185 \
            --app-drop-link 450 185 \
            "release/btgs-${VERSION}-aarch64-apple-darwin.dmg" \
            "dmg_contents/"

      - name: Upload tar.gz artifact
        uses: actions/upload-artifact@v4
        with:
          name: btgs-${{ env.VERSION }}-aarch64-apple-darwin-tar
          path: release/btgs-${{ env.VERSION }}-aarch64-apple-darwin.tar.gz

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: btgs-${{ env.VERSION }}-aarch64-apple-darwin-dmg
          path: release/btgs-${{ env.VERSION }}-aarch64-apple-darwin.dmg
