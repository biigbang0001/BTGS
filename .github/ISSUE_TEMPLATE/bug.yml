name: Bug report
description: Submit a BTGS Core bug report.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        ## This issue tracker is only for technical issues related to Bitcoin Gold BTGS Core.

        * Do not include private keys, wallet passphrases, RPC passwords, VPS credentials, or other secrets.
        * For security reports, read the repository security policy before opening a public issue.
        * If a node is stuck during sync or shows block checksum errors, check disk health, memory, and CPU temperature before filing an issue.

        ----
  - type: checkboxes
    attributes:
      label: Is there an existing issue for this?
      description: Please search to see if an issue already exists for the bug you encountered.
      options:
        - label: I have searched the existing issues
          required: true
  - type: textarea
    id: current-behaviour
    attributes:
      label: Current behaviour
      description: Tell us what went wrong.
    validations:
      required: true
  - type: textarea
    id: expected-behaviour
    attributes:
      label: Expected behaviour
      description: Tell us what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: reproduction-steps
    attributes:
      label: Steps to reproduce
      description: |
        Tell us how to reproduce the bug.
        Include runtime or compile-time configuration options, commands, and screenshots if useful.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: |
        Paste only the relevant log lines or attach a redacted debug log.
        The debug log can contain IP addresses, local paths, wallet labels, or other identifying information.
    validations:
      required: false
  - type: dropdown
    attributes:
      label: How did you obtain BTGS Core?
      multiple: false
      options:
        - Compiled from source
        - GitHub Actions artifact
        - Pre-built binaries
        - Package manager
        - Other
    validations:
      required: true
  - type: input
    id: core-version
    attributes:
      label: What version of BTGS Core are you using?
      description: Run `btgsd --version`, `bitcoind --version`, or in BTGS-Qt use `Help > About BTGS-Qt`, depending on your build.
      placeholder: e.g. v30.2.2 or main@3ce9729
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system and version
      placeholder: e.g. "macOS Sonoma 14.7" or "Ubuntu 24.04 LTS"
    validations:
      required: true
  - type: textarea
    id: machine-specs
    attributes:
      label: Machine specifications
      description: CPU, RAM, disk type, network connectivity, and whether this is a mining/pool node.
    validations:
      required: false
